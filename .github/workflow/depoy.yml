name: deploy.yml

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses:actions/checkout@v3
        name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # safer than StrictHostKeyChecking=no
          ssh-keyscan -H  34.16.179.105  >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          SSH_USER: ngulungudulcinee #${{ secrets.SSH_USER }}
          SSH_HOST: 34.16.179.105 #${{ secrets.SSH_HOST }}
          APP_DIR:  hum # ${{ vars.APP_DIR }}
          PM2_NAME: hum # ${{ vars.PM2_NAME }}
        run: |
          ssh -i ~/.ssh/id_rsa -T "$SSH_USER@$SSH_HOST" <<EOF
            set -e

            cd ~/full-stack-tech-exam

            git pull
            sudo npm ci

            pm2 delete "$PM2_NAME" || true
            pm2 start -f app.js --name "$PM2_NAME"

            pm2 save
          EOF
