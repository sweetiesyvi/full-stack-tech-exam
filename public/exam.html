<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Stack Tech Exam</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <main class="page">
    <section class="card">
      <h1>Full Stack Tech Exam</h1>
      <p class="intro">
        This app demonstrates a full stack data round trip using Node.js, Express, MongoDB, and a JavaScript fetch request.
      </p>

      <div class="notice">
        Before searching, initialize sample data once by visiting:
        <code>/api/init-emoji</code>
  
  <!-- 💁🏼‍♂️ you may need to initialize some data before searching. Check the server endpoints -->
  
    </div>

      <h2>Search for Name</h2>
    <!-- 
    this form doesn't let you receive data back and put into the <p id="result">.
    what do we need to do here with an external <script> 
    -->
    <form id="nameForm">
        <label for="userName">Enter name:</label>
        <input
          type="text"
          id="userName"
          name="userName"
          placeholder="Enter a name (e.g., sweetie)"
          required
        >
        <input type="submit" value="Search">
      </form>

      <p id="result"></p>
    </section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
